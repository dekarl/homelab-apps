name: Build sandbox-mcp image

# Builds and pushes the sandbox-mcp sidecar image to ghcr.io.
#
# Image: ghcr.io/<owner>/lobehub-sandbox-mcp:1.0.<run_number> and :latest
#
# Renovate tracks the semver tag in Pulumi.dev.yaml and opens patch-bump PRs
# automatically. No manual image reference updates needed.

on:
  push:
    branches:
      - main
    paths:
      - apps/lobehub/sandbox-mcp/**
      - "!**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to ghcr.io
  id-token: write   # required for provenance attestation (docker/build-push-action@v6)

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/lobehub/sandbox-mcp
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lobehub-sandbox-mcp:1.0.${{ github.run_number }}
            ghcr.io/${{ github.repository_owner }}/lobehub-sandbox-mcp:latest
          # BuildKit GHA cache — dramatically speeds up repeated Rust/pip builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
